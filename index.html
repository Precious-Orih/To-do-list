<!DOCTYPE html>
<html lang="en">
<head>
    <title>To-do List</title>
    <style>
        .deleteBtn{
            background-color: red;
        }
       
    </style>
</head>
<body>
    <h1>To-do List</h1>
    <h2 id="todaysDate">Today is:</h2>
    <input id="inputTitle" type="text" placeholder="type in your task">
    <input id="inputDate" type="date">
    <input id="inputTime" type="time">
    <button id="add">Add</button>
    <button id="clear">Clear</button>
    <ul id="taskList"></ul>
    <script src="index.js" defer></script>
</body>
</html>
